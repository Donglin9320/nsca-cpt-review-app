<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">解剖学三大运动平面示意图</title>
  <desc id="desc">矢状面分左右，额状面分前后，水平面分上下，用于理解屈伸、外展内收、旋转等动作。</desc>
  <rect width="920" height="560" fill="#f8fbf9"/>
  <g transform="translate(88 42)">
    <text x="0" y="0" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800" fill="#17201a">解剖学三大平面</text>
    <text x="0" y="34" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#5f6c62">用平面判断动作方向：屈伸、外展内收、旋转/水平内收外展</text>
  </g>

  <g transform="translate(88 120)">
    <rect x="0" y="0" width="220" height="366" rx="14" fill="#ffffff" stroke="#d7e0da" stroke-width="2"/>
    <text x="110" y="34" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#0f5f8c">矢状面</text>
    <text x="110" y="60" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#47544a">分左 / 右</text>
    <g transform="translate(58 82)">
      <ellipse cx="52" cy="34" rx="32" ry="34" fill="#f0d7c7" stroke="#49574f" stroke-width="3"/>
      <path d="M52 70 L52 186" stroke="#49574f" stroke-width="14" stroke-linecap="round"/>
      <path d="M52 96 C25 118 20 146 18 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 96 C79 118 84 146 86 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 186 C33 224 30 256 28 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <path d="M52 186 C71 224 74 256 76 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <polygon points="52,-8 104,40 52,326 0,280" fill="#2f9ed8" opacity="0.34" stroke="#0f75ad" stroke-width="3"/>
      <line x1="52" y1="-8" x2="52" y2="326" stroke="#0f75ad" stroke-width="4" stroke-dasharray="7 6"/>
    </g>
    <text x="24" y="330" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">常见动作：</text>
    <text x="24" y="354" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">屈曲、伸展</text>
  </g>

  <g transform="translate(350 120)">
    <rect x="0" y="0" width="220" height="366" rx="14" fill="#ffffff" stroke="#d7e0da" stroke-width="2"/>
    <text x="110" y="34" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#167344">额状面</text>
    <text x="110" y="60" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#47544a">冠状面，分前 / 后</text>
    <g transform="translate(58 82)">
      <ellipse cx="52" cy="34" rx="32" ry="34" fill="#f0d7c7" stroke="#49574f" stroke-width="3"/>
      <path d="M52 70 L52 186" stroke="#49574f" stroke-width="14" stroke-linecap="round"/>
      <path d="M52 96 C25 118 20 146 18 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 96 C79 118 84 146 86 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 186 C33 224 30 256 28 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <path d="M52 186 C71 224 74 256 76 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <polygon points="-10,30 114,30 114,300 -10,300" fill="#22a862" opacity="0.30" stroke="#167344" stroke-width="3"/>
      <line x1="-10" y1="166" x2="114" y2="166" stroke="#167344" stroke-width="4" stroke-dasharray="7 6"/>
    </g>
    <text x="24" y="330" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">常见动作：</text>
    <text x="24" y="354" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">外展、内收</text>
  </g>

  <g transform="translate(612 120)">
    <rect x="0" y="0" width="220" height="366" rx="14" fill="#ffffff" stroke="#d7e0da" stroke-width="2"/>
    <text x="110" y="34" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#a85a00">水平面</text>
    <text x="110" y="60" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#47544a">横断面，分上 / 下</text>
    <g transform="translate(58 82)">
      <ellipse cx="52" cy="34" rx="32" ry="34" fill="#f0d7c7" stroke="#49574f" stroke-width="3"/>
      <path d="M52 70 L52 186" stroke="#49574f" stroke-width="14" stroke-linecap="round"/>
      <path d="M52 96 C25 118 20 146 18 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 96 C79 118 84 146 86 172" fill="none" stroke="#49574f" stroke-width="12" stroke-linecap="round"/>
      <path d="M52 186 C33 224 30 256 28 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <path d="M52 186 C71 224 74 256 76 296" fill="none" stroke="#49574f" stroke-width="13" stroke-linecap="round"/>
      <ellipse cx="52" cy="146" rx="76" ry="26" fill="#f28c28" opacity="0.35" stroke="#a85a00" stroke-width="3"/>
      <line x1="-24" y1="146" x2="128" y2="146" stroke="#a85a00" stroke-width="4" stroke-dasharray="7 6"/>
    </g>
    <text x="24" y="330" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">常见动作：</text>
    <text x="24" y="354" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#17201a">旋转、水平内收</text>
  </g>
</svg>
