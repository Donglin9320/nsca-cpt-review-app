<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">运动营养基础速记图</title>
  <desc id="desc">碳水化合物、蛋白质、脂肪、水和微量营养素在运动表现与恢复中的基本功能。</desc>
  <rect width="920" height="520" fill="#f8fbf9"/>
  <text x="70" y="58" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800" fill="#17201a">运动营养基础</text>
  <text x="70" y="90" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#59665d">先分清功能：供能、修复、储能、体液平衡、缺乏风险。</text>
  <g transform="translate(75 138)">
    <rect x="0" y="0" width="150" height="220" rx="16" fill="#ffffff" stroke="#d6dfda" stroke-width="2"/>
    <circle cx="75" cy="62" r="34" fill="#fff0d4" stroke="#d7931f" stroke-width="3"/>
    <text x="75" y="69" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#8a6414">糖</text>
    <text x="75" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#17201a">碳水</text>
    <text x="75" y="154" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">糖原</text>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">高强度供能</text>
  </g>
  <g transform="translate(250 138)">
    <rect x="0" y="0" width="150" height="220" rx="16" fill="#ffffff" stroke="#d6dfda" stroke-width="2"/>
    <circle cx="75" cy="62" r="34" fill="#e9f3df" stroke="#5a8f35" stroke-width="3"/>
    <text x="75" y="69" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#3f6b24">修</text>
    <text x="75" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#17201a">蛋白质</text>
    <text x="75" y="154" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">组织修复</text>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">合成适应</text>
  </g>
  <g transform="translate(425 138)">
    <rect x="0" y="0" width="150" height="220" rx="16" fill="#ffffff" stroke="#d6dfda" stroke-width="2"/>
    <circle cx="75" cy="62" r="34" fill="#f4dfed" stroke="#a23b78" stroke-width="3"/>
    <text x="75" y="69" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#7c2e5d">储</text>
    <text x="75" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#17201a">脂肪</text>
    <text x="75" y="154" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">长期能量</text>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">激素相关</text>
  </g>
  <g transform="translate(600 138)">
    <rect x="0" y="0" width="150" height="220" rx="16" fill="#ffffff" stroke="#d6dfda" stroke-width="2"/>
    <circle cx="75" cy="62" r="34" fill="#dceef8" stroke="#2278a8" stroke-width="3"/>
    <text x="75" y="69" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#195a7f">液</text>
    <text x="75" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="800" fill="#17201a">水/电解质</text>
    <text x="75" y="154" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">体温调节</text>
    <text x="75" y="180" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" fill="#59665d">神经肌肉</text>
  </g>
  <g transform="translate(775 138)">
    <rect x="0" y="0" width="90" height="220" rx="16" fill="#ffffff" stroke="#d6dfda" stroke-width="2"/>
    <circle cx="45" cy="62" r="30" fill="#efe8dc" stroke="#8f7252" stroke-width="3"/>
    <text x="45" y="69" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#6b563f">微</text>
    <text x="45" y="122" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="800" fill="#17201a">维/矿</text>
    <text x="45" y="154" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#59665d">铁</text>
    <text x="45" y="178" text-anchor="middle" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="#59665d">钙</text>
  </g>
  <text x="75" y="430" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="16" fill="#59665d">考试判断：私人教练可做基础营养教育；诊断、治疗、处方化饮食计划应转介合格专业人员。</text>
</svg>
