<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <title>NSCA-CPT 复习</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="global-header">
      <div class="global-header-inner">
        <div class="brand" aria-label="NSCA-CPT 复习">
          <span class="brand-mark" aria-hidden="true">CPT</span>
          <div>
            <h1>NSCA-CPT</h1>
            <p>个人复习</p>
          </div>
        </div>

        <nav class="tabs desktop-tabs" role="tablist" aria-label="主要功能">
          <button class="tab active" type="button" data-view="quiz">刷题</button>
          <button class="tab" type="button" data-view="notes">重点</button>
          <button class="tab" type="button" data-view="wrong">错题</button>
          <button class="tab" type="button" data-view="bank">题库</button>
          <button class="tab" type="button" data-view="materials">资料</button>
        </nav>

        <button id="resetProgressBtn" class="header-action" type="button">清空进度</button>
      </div>
    </header>

    <div class="app-shell">
      <aside class="sidebar" aria-label="学习概况">
        <div class="rail-heading">
          <span>今日学习</span>
          <strong id="dailyGoalText">0 / 150 题</strong>
        </div>

        <div class="goal-track" aria-hidden="true"><div id="dailyGoalFill"></div></div>

        <div class="stats-grid">
          <div><span id="accuracy">0%</span><label>正确率</label></div>
          <div><span id="wrongCount">0</span><label>错题</label></div>
          <div><span id="totalQuestions">0</span><label>题目</label></div>
        </div>

        <section class="game-panel" aria-label="连续学习记录">
          <div class="level-row">
            <span id="levelBadge" class="level-badge">Lv.1</span>
            <div><strong id="totalXp">0 XP</strong><span id="streakText">连续 0 天</span></div>
          </div>
          <div class="mini-metrics">
            <span id="comboText">连答 0</span>
            <span id="bestComboText">最佳 0</span>
          </div>
        </section>

        <div class="rail-label">选择单元</div>
        <nav id="unitNav" class="unit-nav" aria-label="单元"></nav>
      </aside>

      <main class="main-panel">
        <header class="topbar" aria-label="刷题设置">
          <div class="toolbar">
            <label>
              <span>单元</span>
              <select id="unitSelect" aria-label="选择单元"></select>
            </label>
            <label>
              <span>模式</span>
              <select id="modeSelect" aria-label="刷题模式">
                <option value="sequential">顺序</option>
                <option value="random">随机</option>
                <option value="curated">重点题</option>
                <option value="wrong">错题</option>
              </select>
            </label>
          </div>
        </header>

        <section id="quizView" class="view active">
          <div class="quiz-layout">
            <section class="question-card">
              <div class="question-meta">
                <span id="questionUnit">单元</span>
                <span id="questionProgress">0 / 0</span>
              </div>
              <h2 id="questionText"></h2>
              <img id="questionImage" class="question-image hidden" alt="" />
              <div id="choiceList" class="choice-list"></div>
              <div id="instantFeedback" class="instant-feedback hidden" aria-live="polite"></div>
              <div id="rewardToast" class="reward-toast hidden" aria-live="polite"></div>
              <div id="resultPanel" class="result-panel hidden"></div>
              <div class="question-actions">
                <button id="prevBtn" class="secondary-button" type="button">上一题</button>
                <button id="nextBtn" class="primary-button" type="button">下一题</button>
              </div>
            </section>

            <aside class="focus-panel">
              <span class="panel-eyebrow">当前单元</span>
              <h3 id="focusTitle">单元重点</h3>
              <ul id="focusPoints"></ul>
            </aside>
          </div>
        </section>

        <section id="notesView" class="view"><div id="notesGrid" class="notes-grid"></div></section>

        <section id="wrongView" class="view">
          <div class="section-head">
            <div><span class="section-eyebrow">根据你的作答自动整理</span><h2>错题本</h2></div>
            <button id="reviewWrongBtn" class="primary-button" type="button">只刷错题</button>
          </div>
          <div id="wrongList" class="list-panel"></div>
        </section>

        <section id="bankView" class="view">
          <div class="section-head bank-head">
            <div><span class="section-eyebrow">查找题干、动作或知识点</span><h2>题库检索</h2></div>
            <input id="searchInput" type="search" placeholder="搜索题干、选项或来源" />
          </div>
          <div id="bankList" class="list-panel"></div>
        </section>

        <section id="materialsView" class="view">
          <div class="section-head"><div><span class="section-eyebrow">本地复习资料</span><h2>资料读取状态</h2></div></div>
          <div id="materialsList" class="materials-list"></div>
        </section>
      </main>
    </div>

    <nav class="tabs mobile-tabs" role="tablist" aria-label="主要功能">
      <button class="tab active" type="button" data-view="quiz">刷题</button>
      <button class="tab" type="button" data-view="notes">重点</button>
      <button class="tab" type="button" data-view="wrong">错题</button>
      <button class="tab" type="button" data-view="bank">题库</button>
      <button class="tab" type="button" data-view="materials">资料</button>
    </nav>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
